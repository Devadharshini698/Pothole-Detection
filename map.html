<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pothole Navigation Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --light-bg: #ecf0f1;
            --card-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
            --card-shadow-hover: 0 8px 16px rgba(0, 0, 0, 0.12);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--primary-color);
        }

        .navbar {
            background: white;
            box-shadow: var(--card-shadow);
            padding: 1rem 0;
            margin-bottom: 2rem;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .navbar-brand i {
            color: var(--accent-color);
            font-size: 1.75rem;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 0.95rem;
            font-weight: 400;
            margin-top: 0.25rem;
        }

        .main-card {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--card-shadow);
            margin-bottom: 1.5rem;
            transition: box-shadow 0.3s ease;
        }

        .main-card:hover {
            box-shadow: var(--card-shadow-hover);
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title i {
            color: var(--secondary-color);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-control {
            border: 2px solid #e0e6ed;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: #fafbfc;
        }

        .form-control:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1);
            background: white;
            outline: none;
        }

        .form-select {
            border: 2px solid #e0e6ed;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            background: #fafbfc;
        }

        .btn-primary-custom {
            background: var(--secondary-color);
            border: none;
            border-radius: 10px;
            padding: 0.75rem 1.5rem;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .btn-primary-custom:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }

        .btn-secondary-custom {
            background: white;
            border: 2px solid #e0e6ed;
            border-radius: 10px;
            padding: 0.75rem 1.5rem;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            color: var(--primary-color);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .btn-secondary-custom:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
            transform: translateY(-2px);
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 1.5rem;
            color: white;
            margin-bottom: 1rem;
        }

        .stat-card.speed {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .stat-card.eta {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .stat-card.fuel {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .stat-card h6 {
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0.9;
            margin-bottom: 0.5rem;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
        }

        .stat-card .unit {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-left: 0.25rem;
        }

        #map {
            height: 60vh;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            border: none;
        }

        #directions-panel {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--card-shadow);
            max-height: 300px;
            overflow-y: auto;
        }

        #directions-panel::-webkit-scrollbar {
            width: 8px;
        }

        #directions-panel::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        #directions-panel::-webkit-scrollbar-thumb {
            background: #bdc3c7;
            border-radius: 10px;
        }

        .alert-warning-custom {
            background: linear-gradient(135deg, #fff5e6 0%, #ffe8cc 100%);
            border-left: 4px solid var(--warning-color);
            border-radius: 10px;
            padding: 1.25rem;
            margin-top: 1rem;
        }

        .alert-warning-custom h5 {
            color: #d68910;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .alert-success-custom {
            background: linear-gradient(135deg, #e8f8f5 0%, #d5f4e6 100%);
            border-left: 4px solid var(--success-color);
            border-radius: 10px;
            padding: 1.25rem;
            margin-top: 1rem;
        }

        .alert-danger-custom {
            background: linear-gradient(135deg, #ffe6e6 0%, #ffcccc 100%);
            border-left: 4px solid var(--accent-color);
            border-radius: 10px;
            padding: 1.25rem;
            margin-top: 1rem;
            animation: pulse 1s ease-in-out infinite;
        }

        .alert-danger-custom h5 {
            color: #c0392b;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .route-info {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border-left: 4px solid var(--secondary-color);
            border-radius: 10px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .filter-btn {
            background: white;
            border: 2px solid #e0e6ed;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            margin: 0.25rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }

        .d-none {
            display: none !important;
        }

        .trip-stats {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 1rem;
        }

        .trip-stats h5 {
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .trip-stats .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        @media (max-width: 768px) {
            #map {
                height: 50vh;
            }
            .stat-card .value {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <i class="fas fa-road"></i>
                <div>
                    <div>Pothole Navigation</div>
                    <div class="subtitle">Advanced route planning with real-time tracking</div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container pb-4">
        <!-- Route Planning Section -->
        <div class="row">
            <div class="col-12">
                <div class="main-card">
                    <div class="section-title">
                        <i class="fas fa-location-dot"></i>
                        Route Planning
                    </div>
                    <div class="row">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="start" class="form-label">Starting Point</label>
                                <input type="text" class="form-control" id="start" placeholder="Enter starting location">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="end" class="form-label">Destination</label>
                                <input type="text" class="form-control" id="end" placeholder="Enter destination">
                            </div>
                        </div>
                        <div class="col-md-2">
                            <div class="form-group">
                                <label for="routeMode" class="form-label">Route Mode</label>
                                <select class="form-select" id="routeMode">
                                    <option value="safest">🛡️ Safest</option>
                                    <option value="fastest">⚡ Fastest</option>
                                    <option value="balanced">⚖️ Balanced</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">&nbsp;</label>
                            <button class="btn-primary-custom w-100 mb-2" onclick="calculateRoute()">
                                <i class="fas fa-route"></i>
                                Navigate
                            </button>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-12">
                            <label class="form-label">Severity Filter</label>
                            <div>
                                <button class="filter-btn active" data-severity="all" onclick="toggleSeverityFilter(this)">
                                    All
                                </button>
                                <button class="filter-btn active" data-severity="high" onclick="toggleSeverityFilter(this)">
                                    🔴 High
                                </button>
                                <button class="filter-btn active" data-severity="med" onclick="toggleSeverityFilter(this)">
                                    🟡 Medium
                                </button>
                                <button class="filter-btn active" data-severity="low" onclick="toggleSeverityFilter(this)">
                                    🟢 Low
                                </button>
                                <button class="filter-btn" onclick="toggleHeatmap()">
                                    <i class="fas fa-fire"></i> Heatmap
                                </button>
                                <button class="filter-btn" onclick="shareRoute()">
                                    <i class="fas fa-share"></i> Share
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats Dashboard -->
        <div class="row">
            <div class="col-md-3">
                <div class="stat-card speed">
                    <h6><i class="fas fa-gauge-high"></i> Current Speed</h6>
                    <div class="value" id="speedValue">0<span class="unit">km/h</span></div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card eta">
                    <h6><i class="fas fa-clock"></i> ETA</h6>
                    <div class="value" id="etaValue">--<span class="unit">min</span></div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card fuel">
                    <h6><i class="fas fa-gas-pump"></i> Fuel Saved</h6>
                    <div class="value" id="fuelValue">0<span class="unit">L</span></div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <h6><i class="fas fa-triangle-exclamation"></i> Potholes Avoided</h6>
                    <div class="value" id="avoidedValue">0</div>
                </div>
            </div>
        </div>

        <!-- GPS & Controls -->
        <div class="row">
            <div class="col-md-6">
                <div class="main-card">
                    <button class="btn-primary-custom w-100 mb-2" onclick="toggleTracking()" id="trackBtn">
                        <i class="fas fa-location-crosshairs"></i>
                        Start GPS Tracking
                    </button>
                    <button class="btn-secondary-custom w-100 mb-2" onclick="toggleVoice()" id="voiceBtn">
                        <i class="fas fa-volume-up"></i>
                        Enable Voice Alerts
                    </button>
                    <button class="btn-secondary-custom w-100" onclick="clearMap()">
                        <i class="fas fa-refresh"></i>
                        Reset All
                    </button>
                </div>
            </div>
            <div class="col-md-6">
                <div class="main-card">
                    <label class="form-label">Voice Settings</label>
                    <select class="form-select mb-2" id="voiceSelect" onchange="updateVoice()">
                        <option value="0">Voice 1 (Default)</option>
                        <option value="1">Voice 2 (Male)</option>
                        <option value="2">Voice 3 (Female)</option>
                    </select>
                    <label class="form-label">Alert Distance</label>
                    <input type="range" class="form-range" min="50" max="200" value="100" id="alertRange" onchange="updateAlertDistance()">
                    <small id="alertDistanceLabel">100 meters</small>
                </div>
            </div>
        </div>

        <!-- Alerts -->
        <div class="row">
            <div class="col-12">
                <div id="gps-alert" class="d-none"></div>
                <div id="directions-panel" class="d-none"></div>
            </div>
        </div>

        <!-- Map -->
        <div class="row">
            <div class="col-12">
                <div class="main-card">
                    <div id="map"></div>
                    <div id="firebase-status" class="error-message d-none"></div>
                </div>
            </div>
        </div>

        <!-- Trip Statistics -->
        <div class="row">
            <div class="col-12">
                <div class="trip-stats d-none" id="tripStats">
                    <h5><i class="fas fa-chart-line"></i> Trip Statistics</h5>
                    <div class="stat-row">
                        <span>Total Distance:</span>
                        <strong id="tripDistance">0 km</strong>
                    </div>
                    <div class="stat-row">
                        <span>Trip Duration:</span>
                        <strong id="tripDuration">0 min</strong>
                    </div>
                    <div class="stat-row">
                        <span>Potholes Detected:</span>
                        <strong id="tripPotholes">0</strong>
                    </div>
                    <div class="stat-row">
                        <span>Avg Speed:</span>
                        <strong id="tripAvgSpeed">0 km/h</strong>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAlTDkvjYFV0-Sqobgce-vGqHopZyT-MIY&libraries=geometry,visualization&callback=initMap"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB8WMVMzLFVGLqQJLUZHAvkmzuGjUtkJE0",
            authDomain: "potholeshack-6d5f9.firebaseapp.com",
            projectId: "potholeshack-6d5f9",
            storageBucket: "potholeshack-6d5f9.firebasestorage.app",
            messagingSenderId: "922537033891",
            appId: "1:922537033891:web:228f49870fd58736ebbf16",
            measurementId: "G-35PZ3QGZJB"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let map;
        let directionsService;
        let directionsRenderer;
        let alternativePolylines = [];
        let potholeMarkers = [];
        let allLogs = [];
        let userMarker = null;
        let watchId = null;
        let isTracking = false;
        let voiceEnabled = false;
        let alertedPotholes = new Set();
        let heatmap = null;
        let heatmapVisible = false;
        let currentRoute = null;
        let tripStartTime = null;
        let tripDistance = 0;
        let speedHistory = [];
        let alertDistance = 100;
        let activeSeverityFilters = new Set(['high', 'med', 'low']);
        let synth = window.speechSynthesis;
        let voices = [];

        function initMap() {
            const directionsPanel = document.getElementById('directions-panel');
            map = new google.maps.Map(document.getElementById('map'), {
                zoom: 12,
                center: { lat: 11.4220, lng: 77.6286 },
                mapTypeControl: true,
                streetViewControl: true,
                fullscreenControl: true,
                zoomControl: true,
                styles: [
                    { featureType: 'poi', elementType: 'labels', stylers: [{ visibility: 'simplified' }] },
                    { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#a7d3f7' }] },
                    { featureType: 'landscape', elementType: 'geometry', stylers: [{ color: '#f5f5f5' }] }
                ]
            });

            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({
                suppressMarkers: false,
                polylineOptions: {
                    strokeColor: '#e74c3c',
                    strokeWeight: 7,
                    strokeOpacity: 0.9,
                    zIndex: 10
                }
            });
            directionsRenderer.setPanel(directionsPanel);
            directionsRenderer.setMap(map);

            loadPotholeFlags();
            loadVoices();
        }

        function loadVoices() {
            voices = synth.getVoices();
            if (voices.length === 0) {
                synth.onvoiceschanged = () => {
                    voices = synth.getVoices();
                };
            }
        }

        function loadPotholeFlags() {
            const statusEl = document.getElementById('firebase-status');
            statusEl.classList.add('d-none');

            db.collection('pothole_logs').get().then((querySnapshot) => {
                allLogs = [];
                const bounds = new google.maps.LatLngBounds();

                if (querySnapshot.empty) {
                    statusEl.innerHTML = '<i class="fas fa-info-circle"></i> No pothole data available.';
                    statusEl.classList.remove('d-none');
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const log = doc.data();
                    if (log.lat && log.lon && typeof log.lat === 'number' && typeof log.lon === 'number') {
                        allLogs.push(log);
                        addPotholeMarker(log.lat, log.lon, log.num_unique_potholes || 1, log.severity || 'unknown', log.confidence || 0, log.datetime || 'Unknown', bounds);
                    }
                });

                if (allLogs.length > 0) {
                    map.fitBounds(bounds);
                    google.maps.event.addListenerOnce(map, 'bounds_changed', () => {
                        if (map.getZoom() > 16) map.setZoom(16);
                    });
                }
            }).catch((error) => {
                console.error("Error loading potholes:", error);
                statusEl.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Error: ${error.message}`;
                statusEl.classList.remove('d-none');
            });
        }

        function addPotholeMarker(lat, lng, numPotholes, severity, confidence, datetime, bounds) {
            const position = { lat: lat, lng: lng };
            let iconUrl;

            if (severity.includes('low')) {
                iconUrl = 'http://maps.google.com/mapfiles/ms/icons/green-dot.png';
            } else if (severity.includes('med')) {
                iconUrl = 'http://maps.google.com/mapfiles/ms/icons/yellow-dot.png';
            } else {
                iconUrl = 'http://maps.google.com/mapfiles/ms/icons/red-dot.png';
            }

            const marker = new google.maps.Marker({
                position: position,
                map: map,
                title: `${numPotholes} Pothole(s) - ${severity}`,
                icon: {
                    url: iconUrl,
                    scaledSize: new google.maps.Size(24, 38),
                    anchor: new google.maps.Point(12, 38)
                }
            });

            const infoWindow = new google.maps.InfoWindow({
                content: `
                    <div style="padding: 8px; font-family: Inter, sans-serif;">
                        <h6 style="margin: 0 0 8px 0; font-weight: 600;">${numPotholes} Pothole(s)</h6>
                        <div style="font-size: 0.9rem; line-height: 1.6;">
                            <strong>Severity:</strong> ${severity}<br>
                            <strong>Confidence:</strong> ${confidence.toFixed(2)}<br>
                            <strong>Time:</strong> ${datetime}<br>
                            <strong>Location:</strong> ${lat.toFixed(4)}, ${lng.toFixed(4)}
                        </div>
                    </div>
                `
            });

            marker.addListener('click', () => {
                infoWindow.open(map, marker);
            });

            marker.severityType = severity.includes('high') ? 'high' : severity.includes('med') ? 'med' : 'low';
            potholeMarkers.push(marker);
            bounds.extend(position);
        }

        function toggleSeverityFilter(btn) {
            const severity = btn.dataset.severity;
           
            if (severity === 'all') {
                activeSeverityFilters = new Set(['high', 'med', 'low']);
                document.querySelectorAll('.filter-btn[data-severity]').forEach(b => b.classList.add('active'));
            } else {
                btn.classList.toggle('active');
                if (btn.classList.contains('active')) {
                    activeSeverityFilters.add(severity);
                } else {
                    activeSeverityFilters.delete(severity);
                }
            }

            potholeMarkers.forEach(marker => {
                marker.setVisible(activeSeverityFilters.has(marker.severityType));
            });
        }

        function toggleHeatmap() {
            if (!heatmapVisible) {
                const heatmapData = allLogs.map(log => ({
                    location: new google.maps.LatLng(log.lat, log.lon),
                    weight: log.severity.includes('high') ? 3 : log.severity.includes('med') ? 2 : 1
                }));

                heatmap = new google.maps.visualization.HeatmapLayer({
                    data: heatmapData,
                    map: map,
                    radius: 30,
                    opacity: 0.6
                });
                heatmapVisible = true;
               
                potholeMarkers.forEach(m => m.setVisible(false));
            } else {
                heatmap.setMap(null);
                heatmap = null;
                heatmapVisible = false;
                potholeMarkers.forEach(m => m.setVisible(activeSeverityFilters.has(m.severityType)));
            }
        }

        function calculateRoute() {
            const start = document.getElementById('start').value;
            const end = document.getElementById('end').value;
            const mode = document.getElementById('routeMode').value;

            if (!start || !end) {
                alert('Please enter both starting point and destination');
                return;
            }

            console.log(`Calculating route in ${mode} mode...`);

            directionsRenderer.setDirections({ routes: [] });
            alternativePolylines.forEach(p => p.setMap(null));
            alternativePolylines = [];

            const directionsPanel = document.getElementById('directions-panel');
            directionsPanel.innerHTML = '';
            directionsPanel.classList.remove('d-none');

            const request = {
                origin: start,
                destination: end,
                travelMode: 'DRIVING',
                provideRouteAlternatives: true,
                avoidFerries: true,
                avoidTolls: false
            };

            directionsService.route(request, (result, status) => {
                if (status === 'OK' && result.routes && result.routes.length > 0) {
                    console.log(`Found ${result.routes.length} routes`);
                   
                    let bestRoute = null;
                    let bestRouteIndex = -1;
                    let bestScore = mode === 'safest' ? Infinity : -Infinity;
                    let bestWarnings = [];
                    let bestPotholes = 0;
                    let routeAnalysis = [];

                    // Analyze each route
                    result.routes.forEach((route, index) => {
                        const routePath = route.overview_path;
                        let potholeCount = 0;
                        let highSeverityCount = 0;
                        let mediumSeverityCount = 0;
                        let lowSeverityCount = 0;
                        let routeWarnings = [];

                        // Count potholes near this route
                        allLogs.forEach((log) => {
                            const potholePos = new google.maps.LatLng(log.lat, log.lon);
                            if (isNearRoute(potholePos, routePath, 50)) {
                                potholeCount++;
                               
                                if (log.severity.includes('high')) {
                                    highSeverityCount++;
                                } else if (log.severity.includes('med')) {
                                    mediumSeverityCount++;
                                } else {
                                    lowSeverityCount++;
                                }
                               
                                routeWarnings.push(`${log.num_unique_potholes} pothole(s) - ${log.severity} near ${log.lat.toFixed(4)}, ${log.lon.toFixed(4)}`);
                            }
                        });

                        const distance = route.legs.reduce((sum, leg) => sum + leg.distance.value, 0);
                        const duration = route.legs.reduce((sum, leg) => sum + leg.duration.value, 0);

                        let score;
                        let scoreDetails = {
                            route: index + 1,
                            distance: (distance / 1000).toFixed(1) + ' km',
                            duration: (duration / 60).toFixed(1) + ' min',
                            potholes: potholeCount,
                            high: highSeverityCount,
                            medium: mediumSeverityCount,
                            low: lowSeverityCount
                        };

                        // SCORING LOGIC - DISTINCT FOR EACH MODE
                        if (mode === 'safest') {
                            // SAFEST: Minimize potholes first, then severity, then distance
                            // Lower score = better (we want minimum potholes)
                            score = (highSeverityCount * 1000) +
                                   (mediumSeverityCount * 100) +
                                   (lowSeverityCount * 10) +
                                   (distance / 10000); // distance as tiebreaker
                            scoreDetails.score = `Safety: ${score.toFixed(0)} (lower=better)`;
                           
                        } else if (mode === 'fastest') {
                            // FASTEST: Minimize time, potholes are secondary
                            // Lower score = better (we want minimum duration)
                            score = duration + (highSeverityCount * 30) + (mediumSeverityCount * 10);
                            scoreDetails.score = `Speed: ${score.toFixed(0)} (lower=better)`;
                           
                        } else { // balanced
                            // BALANCED: Equal weight on time and safety
                            // Lower score = better
                            score = (duration / 10) +
                                   (highSeverityCount * 50) +
                                   (mediumSeverityCount * 20) +
                                   (lowSeverityCount * 5);
                            scoreDetails.score = `Balance: ${score.toFixed(0)} (lower=better)`;
                        }

                        routeAnalysis.push(scoreDetails);
                        console.log(`Route ${index + 1}: Score=${score.toFixed(0)}, Potholes=${potholeCount} (H:${highSeverityCount}, M:${mediumSeverityCount}, L:${lowSeverityCount}), Duration=${(duration/60).toFixed(1)}min`);

                        // Select best route based on mode
                        if (mode === 'safest') {
                            // For safest: lower score is better
                            if (score < bestScore) {
                                bestScore = score;
                                bestRoute = route;
                                bestRouteIndex = index;
                                bestWarnings = routeWarnings;
                                bestPotholes = potholeCount;
                            }
                        } else {
                            // For fastest and balanced: lower score is better
                            if (score < bestScore || bestScore === -Infinity) {
                                bestScore = score;
                                bestRoute = route;
                                bestRouteIndex = index;
                                bestWarnings = routeWarnings;
                                bestPotholes = potholeCount;
                            }
                        }
                    });

                    console.log('Route Analysis:', routeAnalysis);
                    console.log(`Best route selected: Route ${bestRouteIndex + 1} with score ${bestScore.toFixed(0)}`);

                    if (bestRoute) {
                        currentRoute = bestRoute;
                        const bestRouteResult = {
                            ...result,
                            routes: [bestRoute],
                            request: result.request
                        };
                       
                        directionsRenderer.setDirections(bestRouteResult);
                       
                        // Show alternative routes in grey
                        result.routes.forEach((route, index) => {
                            if (index !== bestRouteIndex) {
                                const polyline = new google.maps.Polyline({
                                    path: route.overview_path,
                                    strokeColor: '#95a5a6',
                                    strokeWeight: 4,
                                    strokeOpacity: 0.7,
                                    map: map,
                                    zIndex: 5
                                });
                                alternativePolylines.push(polyline);
                            }
                        });

                        const totalDistance = bestRoute.legs.reduce((sum, leg) => sum + leg.distance.value, 0) / 1000;
                        const totalDuration = bestRoute.legs.reduce((sum, leg) => sum + leg.duration.value, 0) / 60;
                       
                        updateETA(totalDuration);
                        calculateFuelSavings(totalDistance, bestPotholes);
                        document.getElementById('avoidedValue').textContent = bestPotholes;
                       
                        setTimeout(() => displayRouteInfo(bestPotholes, bestWarnings, bestRoute, mode), 100);
                    }
                } else {
                    alert('Directions request failed: ' + status);
                }
            });
        }

        function displayRouteInfo(potholeCount, warnings, route, mode) {
            const panel = document.getElementById('directions-panel');
            const totalDistance = route.legs.reduce((sum, leg) => sum + leg.distance.value, 0) / 1000;
            const totalDuration = route.legs.reduce((sum, leg) => sum + leg.duration.value, 0) / 60;

            const modeIcons = {
                safest: '🛡️',
                fastest: '⚡',
                balanced: '⚖️'
            };

            const routeInfoDiv = document.createElement('div');
            routeInfoDiv.className = 'route-info';
            routeInfoDiv.innerHTML = `
                <h5><i class="fas fa-info-circle"></i> ${modeIcons[mode]} Selected ${mode.charAt(0).toUpperCase() + mode.slice(1)} Route</h5>
                <p><strong>Distance:</strong> ${totalDistance.toFixed(1)} km | <strong>Time:</strong> ${totalDuration.toFixed(0)} min | <strong>Nearby Potholes:</strong> ${potholeCount}</p>
            `;

            let statusDiv;
            if (potholeCount > 0) {
                statusDiv = document.createElement('div');
                statusDiv.className = 'alert-warning-custom';
                statusDiv.innerHTML = `
                    <h5><i class="fas fa-triangle-exclamation"></i> Route Hazards Detected</h5>
                    <ul>${warnings.slice(0, 10).map(w => `<li>${w}</li>`).join('')}</ul>
                    ${warnings.length > 10 ? `<p><em>...and ${warnings.length - 10} more potholes</em></p>` : ''}
                `;
            } else {
                statusDiv = document.createElement('div');
                statusDiv.className = 'alert-success-custom';
                statusDiv.innerHTML = `
                    <h5><i class="fas fa-circle-check"></i> Clear Route</h5>
                    <p>No pothole hazards detected along this route. Drive safely.</p>
                `;
            }
           
            panel.prepend(statusDiv);
            panel.prepend(routeInfoDiv);
        }

        function isNearRoute(point, polyline, thresholdMeters = 50) {
            let minDist = Infinity;
            polyline.forEach(p => {
                const dist = google.maps.geometry.spherical.computeDistanceBetween(point, p);
                if (dist < minDist) minDist = dist;
            });
            return minDist <= thresholdMeters;
        }

        function toggleTracking() {
            const btn = document.getElementById('trackBtn');
           
            if (!isTracking) {
                if ('geolocation' in navigator) {
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Tracking Active';
                    btn.style.background = '#27ae60';
                   
                    watchId = navigator.geolocation.watchPosition(
                        updatePosition,
                        handleLocationError,
                        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                    );
                    isTracking = true;
                    tripStartTime = Date.now();
                    document.getElementById('tripStats').classList.remove('d-none');
                } else {
                    alert('GPS not supported on this device');
                }
            } else {
                if (watchId !== null) {
                    navigator.geolocation.clearWatch(watchId);
                    watchId = null;
                }
                if (userMarker) {
                    userMarker.setMap(null);
                    userMarker = null;
                }
                btn.innerHTML = '<i class="fas fa-location-crosshairs"></i> Start GPS Tracking';
                btn.style.background = '#3498db';
                isTracking = false;
                alertedPotholes.clear();
                document.getElementById('gps-alert').classList.add('d-none');
            }
        }

        function updatePosition(position) {
            const userPos = {
                lat: position.coords.latitude,
                lng: position.coords.longitude
            };

            const speed = position.coords.speed ? (position.coords.speed * 3.6) : 0;
            document.getElementById('speedValue').innerHTML = `${speed.toFixed(0)}<span class="unit">km/h</span>`;
           
            if (speed > 0) {
                speedHistory.push(speed);
                if (speedHistory.length > 20) speedHistory.shift();
            }

            if (!userMarker) {
                userMarker = new google.maps.Marker({
                    position: userPos,
                    map: map,
                    icon: {
                        path: google.maps.SymbolPath.CIRCLE,
                        scale: 10,
                        fillColor: '#4285F4',
                        fillOpacity: 1,
                        strokeColor: '#ffffff',
                        strokeWeight: 3
                    },
                    title: 'Your Location',
                    zIndex: 1000
                });

                new google.maps.Circle({
                    map: map,
                    center: userPos,
                    radius: position.coords.accuracy,
                    fillColor: '#4285F4',
                    fillOpacity: 0.1,
                    strokeColor: '#4285F4',
                    strokeOpacity: 0.3,
                    strokeWeight: 1
                });

                map.setCenter(userPos);
                map.setZoom(16);
            } else {
                userMarker.setPosition(userPos);
            }

            updateTripStats();
            checkNearbyPotholes(userPos);
        }

        function checkNearbyPotholes(userPos) {
            let nearestPothole = null;
            let minDistance = Infinity;

            allLogs.forEach((log) => {
                const potholePos = new google.maps.LatLng(log.lat, log.lon);
                const userLatLng = new google.maps.LatLng(userPos.lat, userPos.lng);
                const distance = google.maps.geometry.spherical.computeDistanceBetween(userLatLng, potholePos);

                if (distance < minDistance && distance < alertDistance) {
                    minDistance = distance;
                    nearestPothole = { ...log, distance };
                }
            });

            const alertDiv = document.getElementById('gps-alert');
            const warningDistance = alertDistance / 2;
           
            if (nearestPothole && minDistance < warningDistance) {
                const potholeKey = `${nearestPothole.lat}-${nearestPothole.lon}`;
                if (!alertedPotholes.has(potholeKey)) {
                    alertedPotholes.add(potholeKey);
                    playWarningSound();
                    if (voiceEnabled) {
                        speakAlert(`Pothole ahead in ${Math.round(minDistance)} meters. ${nearestPothole.severity} severity`);
                    }
                }
               
                alertDiv.className = 'alert-danger-custom';
                alertDiv.innerHTML = `
                    <h5><i class="fas fa-exclamation-triangle"></i> ⚠️ POTHOLE AHEAD!</h5>
                    <p><strong>${Math.round(minDistance)}m away</strong> - ${nearestPothole.num_unique_potholes} pothole(s) - ${nearestPothole.severity.toUpperCase()}</p>
                `;
                alertDiv.classList.remove('d-none');
            } else if (nearestPothole && minDistance < alertDistance) {
                alertDiv.className = 'alert-warning-custom';
                alertDiv.innerHTML = `
                    <h5><i class="fas fa-triangle-exclamation"></i> Pothole Nearby</h5>
                    <p><strong>${Math.round(minDistance)}m away</strong> - ${nearestPothole.severity}</p>
                `;
                alertDiv.classList.remove('d-none');
            } else {
                alertDiv.classList.add('d-none');
            }
        }

        function updateTripStats() {
            if (!tripStartTime) return;
           
            const duration = (Date.now() - tripStartTime) / 60000;
            document.getElementById('tripDuration').textContent = `${duration.toFixed(1)} min`;
           
            if (currentRoute) {
                const dist = currentRoute.legs.reduce((sum, leg) => sum + leg.distance.value, 0) / 1000;
                document.getElementById('tripDistance').textContent = `${dist.toFixed(1)} km`;
            }
           
            if (speedHistory.length > 0) {
                const avgSpeed = speedHistory.reduce((a, b) => a + b, 0) / speedHistory.length;
                document.getElementById('tripAvgSpeed').textContent = `${avgSpeed.toFixed(0)} km/h`;
            }
        }

        function updateETA(minutes) {
            document.getElementById('etaValue').innerHTML = `${Math.round(minutes)}<span class="unit">min</span>`;
        }

        function calculateFuelSavings(distance, potholesAvoided) {
            const fuelSaved = (potholesAvoided * 0.05).toFixed(2);
            document.getElementById('fuelValue').innerHTML = `${fuelSaved}<span class="unit">L</span>`;
        }

        function playWarningSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
           
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
           
            oscillator.frequency.value = 800;
            oscillator.type = 'sine';
           
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
           
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        function toggleVoice() {
            voiceEnabled = !voiceEnabled;
            const btn = document.getElementById('voiceBtn');
            if (voiceEnabled) {
                btn.innerHTML = '<i class="fas fa-volume-up"></i> Voice Alerts ON';
                btn.style.background = '#27ae60';
                speakAlert('Voice alerts enabled');
            } else {
                btn.innerHTML = '<i class="fas fa-volume-mute"></i> Voice Alerts OFF';
                btn.style.background = 'white';
            }
        }

        function speakAlert(text) {
            if (!voiceEnabled) return;
           
            const utterance = new SpeechSynthesisUtterance(text);
            const voiceIndex = parseInt(document.getElementById('voiceSelect').value);
            if (voices[voiceIndex]) {
                utterance.voice = voices[voiceIndex];
            }
            utterance.rate = 1.1;
            utterance.pitch = 1.0;
            synth.speak(utterance);
        }

        function updateVoice() {
            if (voiceEnabled) {
                speakAlert('Voice changed');
            }
        }

        function updateAlertDistance() {
            alertDistance = parseInt(document.getElementById('alertRange').value);
            document.getElementById('alertDistanceLabel').textContent = `${alertDistance} meters`;
        }

        function shareRoute() {
            if (!currentRoute) {
                alert('Please calculate a route first');
                return;
            }
           
            const start = document.getElementById('start').value;
            const end = document.getElementById('end').value;
            const shareText = `Check out my safe route from ${start} to ${end} avoiding potholes!`;
           
            if (navigator.share) {
                navigator.share({
                    title: 'Pothole Navigation Route',
                    text: shareText,
                    url: window.location.href
                }).catch(err => console.log('Share failed:', err));
            } else {
                const dummy = document.createElement('textarea');
                document.body.appendChild(dummy);
                dummy.value = shareText;
                dummy.select();
                document.execCommand('copy');
                document.body.removeChild(dummy);
                alert('Route details copied to clipboard!');
            }
        }

        function handleLocationError(error) {
            console.error('GPS Error:', error);
            let message = 'Location error: ';
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    message += 'Please enable location permissions';
                    break;
                case error.POSITION_UNAVAILABLE:
                    message += 'Location unavailable';
                    break;
                case error.TIMEOUT:
                    message += 'Request timeout';
                    break;
            }
            alert(message);
            toggleTracking();
        }

        function clearMap() {
            if (isTracking) {
                toggleTracking();
            }
           
            directionsRenderer.setDirections({ routes: [] });
            alternativePolylines.forEach(p => p.setMap(null));
            alternativePolylines = [];

            const directionsPanel = document.getElementById('directions-panel');
            directionsPanel.innerHTML = '';
            directionsPanel.classList.add('d-none');
           
            document.getElementById('gps-alert').classList.add('d-none');
            document.getElementById('tripStats').classList.add('d-none');
           
            potholeMarkers.forEach(marker => marker.setMap(null));
            potholeMarkers = [];
            allLogs = [];
            currentRoute = null;
            tripStartTime = null;
            speedHistory = [];
           
            document.getElementById('start').value = '';
            document.getElementById('end').value = '';
            document.getElementById('speedValue').innerHTML = '0<span class="unit">km/h</span>';
            document.getElementById('etaValue').innerHTML = '--<span class="unit">min</span>';
            document.getElementById('fuelValue').innerHTML = '0<span class="unit">L</span>';
            document.getElementById('avoidedValue').textContent = '0';
           
            loadPotholeFlags();
        }
    </script>
</body>
</html>
